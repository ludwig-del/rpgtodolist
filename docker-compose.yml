services:
  db:
    image: postgres:16-alpine
    container_name: eldenring_db
    environment:
      POSTGRES_USER:     eldenring
      POSTGRES_PASSWORD: eldenring
      POSTGRES_DB:       eldenring_todo
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eldenring -d eldenring_todo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: eldenring_backend
    environment:
      FLASK_ENV:    development
      DATABASE_URL: postgresql://eldenring:eldenring@db:5432/eldenring_todo
      SECRET_KEY:   super-secret-dev-key-eldenring-2026
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app           # live-reload in dev
    command: >
      sh -c "flask seed-bosses &&
             gunicorn --bind 0.0.0.0:5000 --workers 2 --reload wsgi:app"

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: eldenring_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3002:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: eldenring_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.3
    container_name: eldenring_grafana
    ports:
      - "3003:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  pg_data:
  grafana_data:
