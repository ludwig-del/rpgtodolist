apiVersion: apps/v1
kind: Deployment
metadata:
  name: eldenring-frontend
  namespace: eldenring
  labels:
    app: eldenring-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eldenring-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: eldenring-frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_DOCKERHUB_USERNAME/eldenring-frontend:latest  # updated by Jenkins
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: eldenring-frontend-svc
  namespace: eldenring
spec:
  type: NodePort
  selector:
    app: eldenring-frontend
  ports:
    - port:       80
      targetPort: 80
      nodePort:   30080
