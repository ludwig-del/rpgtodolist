apiVersion: v1
kind: ConfigMap
metadata:
  name: eldenring-config
  namespace: eldenring
data:
  FLASK_ENV:    "production"
  DATABASE_URL: "postgresql://eldenring:eldenring@postgres-svc:5432/eldenring_todo"
---
apiVersion: v1
kind: Secret
metadata:
  name: eldenring-secrets
  namespace: eldenring
type: Opaque
stringData:
  SECRET_KEY:        "REPLACE_WITH_STRONG_KEY"
  POSTGRES_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
