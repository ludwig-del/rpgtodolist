apiVersion: apps/v1
kind: Deployment
metadata:
  name: eldenring-backend
  namespace: eldenring
  labels:
    app: eldenring-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eldenring-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: eldenring-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/metrics"
    spec:
      initContainers:
        - name: run-migrations
          image: YOUR_DOCKERHUB_USERNAME/eldenring-backend:latest  # updated by Jenkins
          imagePullPolicy: IfNotPresent
          command: ["flask", "db", "upgrade"]
          envFrom:
            - configMapRef:
                name: eldenring-config
            - secretRef:
                name: eldenring-secrets
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/eldenring-backend:latest  # updated by Jenkins
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: eldenring-config
            - secretRef:
                name: eldenring-secrets
          readinessProbe:
            httpGet:
              path: /metrics
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: eldenring-backend-svc
  namespace: eldenring
spec:
  type: NodePort
  selector:
    app: eldenring-backend
  ports:
    - port:       5000
      targetPort: 5000
      nodePort:   30500
