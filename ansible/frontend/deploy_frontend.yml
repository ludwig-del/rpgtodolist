---
- name: Deploy frontend image to Kubernetes
  hosts: deploy
  gather_facts: false
  vars:
    kube_namespace: "eldenring"
    deployment_name: "eldenring-frontend"
    container_name: "frontend"
    repo_root: "{{ playbook_dir }}/../.."
  tasks:
    - name: Ensure application namespace exists
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ repo_root }}/k8s/namespace.yaml"

    - name: Ensure frontend deployment exists
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ repo_root }}/k8s/frontend-deployment.yaml"

    - name: Update frontend deployment image
      ansible.builtin.command:
        argv:
          - kubectl
          - set
          - image
          - "deployment/{{ deployment_name }}"
          - "{{ container_name }}={{ frontend_image }}"
          - -n
          - "{{ kube_namespace }}"

    - name: Wait for frontend rollout
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - "deployment/{{ deployment_name }}"
          - -n
          - "{{ kube_namespace }}"
          - --timeout=120s