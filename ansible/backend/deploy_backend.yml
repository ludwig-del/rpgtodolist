---
- name: Deploy backend image to Kubernetes
  hosts: deploy
  gather_facts: false
  vars:
    kube_namespace: "eldenring"
    deployment_name: "eldenring-backend"
    container_name: "backend"
    init_container_name: "run-migrations"
    repo_root: "{{ playbook_dir }}/../.."
  tasks:
    - name: Ensure application namespace exists
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ repo_root }}/infrastructure/k8s/namespace.yaml"

    - name: Ensure shared configuration exists
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ repo_root }}/infrastructure/k8s/configmap.yaml"

    - name: Ensure database resources exist
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ repo_root }}/infrastructure/k8s/postgres-statefulset.yaml"

    - name: Ensure backend deployment exists
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -f
          - "{{ repo_root }}/infrastructure/k8s/backend-deployment.yaml"

    - name: Update backend deployment image
      ansible.builtin.command:
        argv:
          - kubectl
          - patch
          - "deployment/{{ deployment_name }}"
          - -n
          - "{{ kube_namespace }}"
          - --type=strategic
          - -p
          - |
            {
              "spec": {
                "template": {
                  "spec": {
                    "containers": [
                      {
                        "name": "{{ container_name }}",
                        "image": "{{ backend_image }}"
                      }
                    ],
                    "initContainers": [
                      {
                        "name": "{{ init_container_name }}",
                        "image": "{{ backend_image }}"
                      }
                    ]
                  }
                }
              }
            }

    - name: Wait for backend rollout
      ansible.builtin.command:
        argv:
          - kubectl
          - rollout
          - status
          - "deployment/{{ deployment_name }}"
          - -n
          - "{{ kube_namespace }}"
          - --timeout=120s